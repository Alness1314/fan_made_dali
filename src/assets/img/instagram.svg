<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title">
  <title id="title">Instagram</title>
  <defs>
    <linearGradient id="gradient" x1="12" y1="108" x2="108" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd35a"/>
      <stop offset=".28" stop-color="#ff596d"/>
      <stop offset=".58" stop-color="#d62976"/>
      <stop offset="1" stop-color="#6956e8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e879f9" flood-opacity=".42"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#gradient)" filter="url(#glow)"/>
  <rect x="31" y="31" width="58" height="58" rx="18" fill="none" stroke="#fff" stroke-width="7"/>
  <circle cx="60" cy="60" r="14" fill="none" stroke="#fff" stroke-width="7"/>
  <circle cx="87" cy="33" r="5" fill="#fff"/>
</svg>
